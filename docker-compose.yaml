include:
  - db.yaml
  - app.yaml

services:
  cyberhub-web:
    depends_on:
      - CyberHub-S1_db
    extends:
      file: app.yaml
      service: CyberHub-S1_app
    networks:
      - cyberhub-s1_cyberhub-network  # ← เปลี่ยนเป็นชื่อนี้

networks:
  cyberhub-s1_cyberhub-network:
    external: true  # ← ใช้ network ที่มีอยู่แล้ว ไม่สร้างใหม่
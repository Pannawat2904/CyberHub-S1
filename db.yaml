services:
  CyberHub-S1_db:
    image: postgres:16
    container_name: CyberHub-Database
    ports:
      - "${DATABASE_PORT}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    networks:
      - cyberhub-network
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
